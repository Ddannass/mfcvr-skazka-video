<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Талончик и волшебный МФЦ</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .wrap {
      width: min(1000px, 95vw);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Просмотр видео</h1>
    <video controls playsinline>
      <source src="./skazka.mp4" type="video/mp4">
      Ваш браузер не поддерживает видео.
    </video>
  </div>
</body>
</html>
